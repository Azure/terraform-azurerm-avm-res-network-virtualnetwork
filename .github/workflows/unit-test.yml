---
# Runs the hermetic Terraform unit tests (mock providers, no Azure resources)
# on GitHub-hosted runners for every pull request and every push to main.
#
# The managed PR-check workflow already runs these tests, but only on
# non-fork pull requests and it validates the PR branch, not the post-merge
# result. This lightweight workflow closes that gap: because it also runs on
# push to main, a PR that passes against a stale base but breaks main once
# merged (see issue #121) is caught immediately.
name: Unit Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-test:
    name: Terraform Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -test-directory=tests/unit

      - name: Terraform test
        run: terraform test -test-directory=tests/unit
